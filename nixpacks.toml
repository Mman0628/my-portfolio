 
[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.zip", "php84Extensions.pdo", "php84Extensions.sqlite3", "php84Extensions.fileinfo", "php84Extensions.curl", "php84Extensions.openssl", "nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction", "npm ci"]

[phases.build]
cmds = ["npm run build", "php artisan optimize"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"