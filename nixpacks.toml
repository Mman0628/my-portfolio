[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_22", "php84Extensions.mbstring", "php84Extensions.pdo", "php84Extensions.sqlite3", "php84Extensions.fileinfo", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.openssl", "php84Extensions.tokenizer", "php84Extensions.xml"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci",
  "npm run build",
  "php artisan storage:link || true"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"